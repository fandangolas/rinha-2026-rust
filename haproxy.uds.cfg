global
    maxconn 1024
    log     stdout format raw local0

defaults
    mode    http
    timeout connect 1s
    timeout client  5s
    timeout server  5s
    # Per-request timing breakdown (all in ms):
    #   Tq = time to read full request from client
    #   Tw = time request waited in HAProxy queue  ← non-zero means HAProxy backlog
    #   Tc = connection time to backend             ← ~0 for UDS
    #   Tr = server (API) response time             ← pure Rust handler time
    #   Tt = total end-to-end time
    # If Tw >> 0: bottleneck is BEFORE the API (CPU throttle / overload)
    # If Tr >> 0: bottleneck is INSIDE the API
    log-format "haproxy t=%Ts status=%ST Tq=%Tq Tw=%Tw Tc=%Tc Tr=%Tr Tt=%Tt bytes=%B server=%s"

frontend fraud_front
    bind *:9999
    log global
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    # Reuse persistent Unix socket connections — avoids reconnect overhead on
    # every request.  Safe because the API is stateless HTTP/1.1.
    http-reuse always
    option  httpchk GET /ready
    http-check expect status 200
    # unix@ prefix routes through the shared 'sockets' volume.
    # No resolvers or init-addr needed — no DNS involved.
    server api1 unix@/sockets/api1.sock check inter 2s fall 2 rise 1
    server api2 unix@/sockets/api2.sock check inter 2s fall 2 rise 1
