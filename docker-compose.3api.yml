name: rinha-2026-3api

# Short CFS period eliminates the throttle-stall cliff.
# HAProxy 50%: period=2ms, quota=1ms → max stall 1ms.
# API     33%: period=3ms, quota=1ms → max stall 2ms.
# Total: 0.50 + 3×0.33 = 1.49 CPU (within 1.5 CPU challenge limit).

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.3api.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      api3:
        condition: service_healthy
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: fandangolas/rinha-2026-api:latest
    environment:
      SEARCHER: ivf
      IVF_PROBES: "5"
      GOGC: "off"
      GOMEMLIMIT: "45MiB"
      GOMAXPROCS: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    cpu_period: 3000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "100MB"
    networks:
      - backend

  api2:
    image: fandangolas/rinha-2026-api:latest
    environment:
      SEARCHER: ivf
      IVF_PROBES: "5"
      GOGC: "off"
      GOMEMLIMIT: "45MiB"
      GOMAXPROCS: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    cpu_period: 3000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "100MB"
    networks:
      - backend

  api3:
    image: fandangolas/rinha-2026-api:latest
    environment:
      SEARCHER: ivf
      IVF_PROBES: "5"
      GOGC: "off"
      GOMEMLIMIT: "45MiB"
      GOMAXPROCS: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    cpu_period: 3000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "100MB"
    networks:
      - backend

networks:
  backend:
    driver: bridge
