name: rinha-2026-local-k6

# Local k6 test harness — same topology and resource limits as the
# submission compose, but builds the image from the local Dockerfile
# so iteration on source code doesn't require pushing to Docker Hub.
#
# Knobs (override via env or .env file):
#   IVF_PROBES            — search probes per query (default 3)
#   TOKIO_WORKER_THREADS  — tokio runtime threads (default 2)
#   METRICS               — true|false; gates per-phase histograms
#                           and /metrics endpoint (default false)
#
# CPU + memory limits match the submission compose exactly (1.00 CPU /
# 345 MB total), so a local k6 run is representative of the judge.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    cpu_period: 20000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api1.sock
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-2}"
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    cpu_period: 4000
    cpu_quota: 1900
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api2.sock
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-2}"
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    cpu_period: 4000
    cpu_quota: 1900
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
