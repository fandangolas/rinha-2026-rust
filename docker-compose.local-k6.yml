name: rinha-2026-local-k6

# Local k6 test harness — mirrors contest resource limits exactly.
# Uses the pre-built image (data baked in); no host volume mounts.
# haproxy: period=10000µs quota=1000µs → 10% CPU  (Tw=0ms; ~0.9% actual use)
# api1/2:  period=2000µs  quota=1400µs → 70% CPU each
# Total: 0.10 + 0.70 + 0.70 = 1.50 CPU  (challenge limit).

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    cpu_period: 10000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    build:
      context: .
      dockerfile: Dockerfile.rust
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      METRICS: "${METRICS:-false}"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9999 && printf 'GET /ready HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1400
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    build:
      context: .
      dockerfile: Dockerfile.rust
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      METRICS: "${METRICS:-false}"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9999 && printf 'GET /ready HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1400
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

networks:
  backend:
    driver: bridge
