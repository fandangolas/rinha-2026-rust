name: rinha-2026-rust

# CPU budget: 1.00 cores total (contest limit per docs/en/ARCHITECTURE.md).
# HAProxy is a pure proxy — ~0.9% actual CPU at 900 RPS via UDS.
# Give the APIs the rest: 47.5% each → max CFS stall = 2.1ms.
#
# Docker enforces cpu_quota ≥ 1000µs (1ms), so for 47.5% the minimum
# valid period is 4000µs (quota = 1900µs). Period=2000 with quota=950
# is rejected with "CPU cfs quota can not be less than 1ms".
#
#   haproxy: cpu_period=20000µs  cpu_quota=1000µs  →  5.0% = 0.050 CPU
#   api1:    cpu_period= 4000µs  cpu_quota=1900µs  → 47.5% = 0.475 CPU
#   api2:    cpu_period= 4000µs  cpu_quota=1900µs  → 47.5% = 0.475 CPU
#   ──────────────────────────────────────────────────────────────────
#   total:   0.050 + 0.475 + 0.475 = 1.000 CPU ✓
#
# HAProxy ↔ API: Unix Domain Sockets over shared 'sockets' volume.
# HAProxy's internal UDS backend check (option httpchk GET /ready,
# rise 1, inter 2s) is the only readiness gate — no docker healthcheck
# on the APIs, no `condition: service_healthy` on haproxy. This avoids
# the `docker compose up --wait` timeout failure mode where the API
# isn't healthy at the docker layer fast enough.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    # Plain start-order dependency, NOT service_healthy. The judge runs
    # `docker compose up --wait`; if a docker healthcheck doesn't pass
    # before --wait-timeout fires, the whole stack aborts with
    # "dependency apiX failed to start". HAProxy doesn't need a docker
    # healthcheck on the APIs anyway — its own `option httpchk GET /ready`
    # over UDS gates traffic routing (rise 1 → backends UP within ~2s).
    depends_on:
      - api1
      - api2
    cpu_period: 20000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api1.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    cpu_period: 4000
    cpu_quota: 1900
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api2.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    cpu_period: 4000
    cpu_quota: 1900
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
