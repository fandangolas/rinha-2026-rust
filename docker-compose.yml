name: rinha-2026

# Short CFS period eliminates the throttle-stall cliff.
# Linux minimum cpu_quota = 1ms, so period = 1ms / fraction.
# At 50% each component gets 1ms per 2ms window → max stall = 1ms.
# Total: 0.50 + 0.50 + 0.50 = 1.50 CPU (challenge limit).

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: fandangolas/rinha-2026-api:latest
    environment:
      SEARCHER: ivf
      IVF_PROBES: "5"
      GOGC: "off"
      GOMEMLIMIT: "120MiB"
      GOMAXPROCS: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    image: fandangolas/rinha-2026-api:latest
    environment:
      SEARCHER: ivf
      IVF_PROBES: "5"
      GOGC: "off"
      GOMEMLIMIT: "120MiB"
      GOMAXPROCS: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

networks:
  backend:
    driver: bridge
