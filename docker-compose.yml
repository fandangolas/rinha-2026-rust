name: rinha-2026-rust

# Mirror of the submission branch — pulls the published image from Docker
# Hub. Use `docker-compose.local-k6.yml` when iterating on source code
# (that variant builds the image from the local Dockerfile).
#
# CPU budget: 1.00 cores total (contest limit per docs/en/ARCHITECTURE.md).
# Docker enforces cpu_quota ≥ 1000µs (1ms), so 47.5% per API needs
# period ≥ 4000µs (quota = 1900µs).
#
#   haproxy: cpu_period=20000µs  cpu_quota=1000µs  →  5.0% = 0.050 CPU
#   api1:    cpu_period= 4000µs  cpu_quota=1900µs  → 47.5% = 0.475 CPU
#   api2:    cpu_period= 4000µs  cpu_quota=1900µs  → 47.5% = 0.475 CPU
#   ──────────────────────────────────────────────────────────────────
#   total:   0.050 + 0.475 + 0.475 = 1.000 CPU ✓
#   memory:  25  +  160  +  160    = 345 MB ≤ 350 MB ✓
#
# HAProxy ↔ API: Unix Domain Sockets over shared 'sockets' volume.
# HAProxy's internal UDS backend check (option httpchk GET /ready,
# rise 1, inter 2s) is the only readiness gate — no docker healthcheck
# on the APIs, no `condition: service_healthy` on haproxy.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9999/ready"]
      interval: 1s
      timeout: 1s
      retries: 30
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "25MB"
    networks:
      - backend

  api1:
    image: nsilveira/rinha-2026-api-rust:v4
    environment:
      SOCKET_PATH: /sockets/api1.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
    networks:
      - backend

  api2:
    image: nsilveira/rinha-2026-api-rust:v4
    environment:
      SOCKET_PATH: /sockets/api2.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
