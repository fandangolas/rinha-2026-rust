name: rinha-2026-rust

# CPU budget: 1.50 cores total (contest limit).
# HAProxy is a pure proxy — ~0.9% actual CPU at 900 RPS via UDS.
# Give the APIs the rest: 72.5% each → max CFS stall = 550µs (vs 1ms default).
#
#   haproxy: cpu_period=20000µs  cpu_quota=1000µs  →  5.0% = 0.050 CPU
#   api1:    cpu_period= 2000µs  cpu_quota=1450µs  → 72.5% = 0.725 CPU
#   api2:    cpu_period= 2000µs  cpu_quota=1450µs  → 72.5% = 0.725 CPU
#   ──────────────────────────────────────────────────────────────────
#   total:   0.050 + 0.725 + 0.725 = 1.500 CPU ✓
#
# HAProxy ↔ API: Unix Domain Sockets over shared 'sockets' volume.
# No TCP ports exposed by the API containers.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    cpu_period: 20000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api1.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1450
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      SOCKET_PATH: /sockets/api2.sock
      TOKIO_WORKER_THREADS: "2"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/ready"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1450
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
