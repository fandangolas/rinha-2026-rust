name: rinha-2026-rust

# CPU budget: 1.50 cores total (challenge limit).
# HAProxy is a pure proxy — it barely touches the CPU at 900 RPS.
# We give the APIs the lion's share so they can handle load spikes
# without hitting the CFS throttle as often.
#
#   haproxy: period=20000µs quota=1000µs →  5% CPU  (Tw=0ms in all tests; ~0.9% actual use)
#   api1:    period=2000µs  quota=1450µs → 72.5% CPU  (max stall 550µs, down from 1ms)
#   api2:    period=2000µs  quota=1450µs → 72.5% CPU
#   ─────────────────────────────────────────────────
#   total:   0.05 + 0.725 + 0.725 = 1.50 CPU ✓
#
# HAProxy ↔ API communication uses Unix Domain Sockets (UDS) over the
# shared 'sockets' volume.  No TCP ports are exposed by the API containers.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.uds.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    cpu_period: 20000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      SOCKET_PATH: /sockets/api1.sock
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    healthcheck:
      # The API creates the socket file only after it is fully initialised and
      # listening.  HAProxy then performs the actual HTTP health check (GET /ready)
      # through the socket before marking the server as up.
      test: ["CMD", "sh", "-c", "test -S /sockets/api1.sock"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1450
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      SOCKET_PATH: /sockets/api2.sock
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "sh", "-c", "test -S /sockets/api2.sock"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1450
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
