name: rinha-2026-rust

# Same CFS settings as the Go setup: 2ms period, 50% quota → max stall 1ms.
# Rust has no GC, so GOGC/GOMEMLIMIT/GOMAXPROCS are irrelevant.
# TOKIO_WORKER_THREADS=1 limits the async runtime to 1 OS thread,
# equivalent to GOMAXPROCS=1 — minimises context-switch overhead under
# fractional CPU quota.
# Total: 0.50 + 0.50 + 0.50 = 1.50 CPU (challenge limit).
#
# HAProxy ↔ API communication uses Unix Domain Sockets (UDS) over the
# shared 'sockets' volume.  No TCP ports are exposed by the API containers.

services:
  haproxy:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.uds.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "25MB"
    networks:
      - backend

  api1:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      SOCKET_PATH: /sockets/api1.sock
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    healthcheck:
      # The API creates the socket file only after it is fully initialised and
      # listening.  HAProxy then performs the actual HTTP health check (GET /ready)
      # through the socket before marking the server as up.
      test: ["CMD", "sh", "-c", "test -S /sockets/api1.sock"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

  api2:
    image: nsilveira/rinha-2026-api-rust:latest
    environment:
      IVF_PROBES: "${IVF_PROBES:-3}"
      TOKIO_WORKER_THREADS: "${TOKIO_WORKER_THREADS:-1}"
      SOCKET_PATH: /sockets/api2.sock
      METRICS: "${METRICS:-false}"
    volumes:
      - sockets:/sockets
    healthcheck:
      test: ["CMD", "sh", "-c", "test -S /sockets/api2.sock"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 15s
    cpu_period: 2000
    cpu_quota: 1000
    deploy:
      resources:
        limits:
          memory: "160MB"
    networks:
      - backend

volumes:
  sockets:
    driver: local

networks:
  backend:
    driver: bridge
