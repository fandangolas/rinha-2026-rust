global
    maxconn 1024
    log     stdout format raw local0

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s
    hold other      10s
    hold refused    10s
    hold nx         10s
    hold timeout    10s
    hold obsolete   10s

defaults
    mode    http
    timeout connect 1s
    timeout client  5s
    timeout server  5s
    option  http-server-close
    option  forwardfor

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    option  httpchk GET /ready
    http-check expect status 200
    server api1 api1:9999 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
    server api2 api2:9999 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
    server api3 api3:9999 check inter 2s fall 2 rise 1 resolvers docker init-addr libc,none
