global
    maxconn 50000
    log     stdout format raw local0

defaults
    mode    http
    timeout connect 1s
    timeout client  5s
    timeout server  5s
    option  http-server-close
    option  forwardfor

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    option  httpchk GET /ready
    http-check expect status 200
    server api1 api1:9999 check inter 2s fall 2 rise 1
    server api2 api2:9999 check inter 2s fall 2 rise 1
    server api3 api3:9999 check inter 2s fall 2 rise 1
